<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mining Game</title>
<style>
body { margin:0; overflow:hidden; background:#87CEEB; font-family:sans-serif; }
canvas { display:block; margin:auto; background:#87CEEB; }

.gui {
 position:absolute; top:0; left:0;
 width:100%; height:100%;
 background:rgba(0,0,0,0.8);
 color:white; display:none;
 flex-direction:column; align-items:center;
 padding:20px;
 overflow:auto;
}

.item { border:1px solid white; padding:5px; margin:2px; cursor:pointer; width:100px; text-align:center; }

#hotbar {
 position:absolute; bottom:10px; left:50%;
 transform:translateX(-50%);
 display:flex;
}

.hotbar-slot {
 width:60px; height:60px;
 border:2px solid white;
 margin:2px;
 display:flex; align-items:center; justify-content:center;
 background:#333;
}

.selected { border-color:yellow; }

#buttons {
 position:absolute; right:10px; top:10px;
 display:flex; flex-direction:column; gap:5px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="buttons">
<button id="invBtn">Inventory</button>
<button id="shopBtn">Shop</button>
<button id="sellBtn">Sell</button>
<button id="tpBtn">Surface</button>
</div>

<div id="inventory" class="gui">
<h2>Inventory</h2>
<div id="invList"></div>
<button id="closeInv">Close</button>
</div>

<div id="shop" class="gui">
<h2>Shop</h2>
<div id="shopList"></div>
<div id="shopInfo"></div>
<button id="buyBtn">Buy</button>
<button id="closeShop">Close</button>
</div>

<div id="sell" class="gui">
<h2>Sell</h2>
<div id="sellList"></div>
<button id="closeSell">Close</button>
</div>

<div id="hotbar"></div>

<script src="script.js"></script>
</body>
</html>
